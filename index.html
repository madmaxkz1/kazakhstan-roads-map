<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Республиканские трассы Казахстана</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    #map {
      width: 100%;
      height: 100%;
      background: #eef3f8;
    }

    .leaflet-container {
      background: #eef3f8;
    }

    .panel {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 1000;
      width: min(360px, calc(100vw - 48px));
      background: rgba(255,255,255,0.96);
      border-radius: 8px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.18);
      padding: 12px;
    }

    .panel h3 {
      margin: 0 0 8px 0;
      font-size: 16px;
    }

    .panel p, .panel div, .panel label {
      font-size: 13px;
      line-height: 1.35;
    }

    .layers {
      display: grid;
      gap: 6px;
      margin-top: 10px;
      max-height: 320px;
      overflow: auto;
      padding-right: 4px;
    }

    .layers label {
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: 6px;
      align-items: start;
    }

    .road-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .road-actions button {
      border: 1px solid #cbd5e1;
      background: #f8fafc;
      border-radius: 6px;
      padding: 7px 8px;
      font-size: 13px;
      cursor: pointer;
    }

    .road-actions button:hover {
      background: #e0f2fe;
      border-color: #38bdf8;
    }

    .status {
      margin-top: 10px;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="panel">
    <h3>Республиканские трассы Казахстана</h3>
    <p>Отображаются только трассы республиканского значения Республики Казахстан.</p>

    <div class="road-actions">
      <button id="select-all-roads" type="button">Выделить все</button>
      <button id="clear-all-roads" type="button">Снять все</button>
    </div>

    <div id="road-list" class="layers"></div>

    <div id="status" class="status">Загрузка...</div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./republic_roads_manual.js"></script>
  <script>
    const statusEl = document.getElementById("status");
    const roadListEl = document.getElementById("road-list");
    const selectAllRoadsEl = document.getElementById("select-all-roads");
    const clearAllRoadsEl = document.getElementById("clear-all-roads");

    const kazakhstanBoundaryApi = "/api/kazakhstan-boundary";

    const kazakhstanBounds = L.latLngBounds(
      [40.2, 46.0],
      [55.6, 87.5]
    );

    const map = L.map("map", {
      maxBounds: kazakhstanBounds.pad(0.12),
      maxBoundsViscosity: 0.8
    }).setView([48.0, 67.0], 5);

    const republicRoadLayers = new Map();
    let kazakhstanBoundaryLayer;
    let kazakhstanFillLayer;
    let kazakhstanBoundaryRings = [];
    let selectedRoadRef;
    let selectedRoadLayers = [];

    const layersControl = L.control.layers(
      {},
      {},
      { collapsed: false, position: "bottomleft" }
    ).addTo(map);

    setStatus("Загрузка слоев...");
    if (window.location.protocol === "file:") {
      setStatus(
        "Страница открыта как file://.\n" +
        "Серверные слои карты в этом режиме не работают.\n" +
        "Откройте карту через Render-ссылку или http://127.0.0.1:8000/index.html."
      );
    }

    loadKazakhstanBoundary().then(boundaryReady => {
      if (!boundaryReady) {
        appendStatus("Дороги не загружены: сначала нужна граница Казахстана для отсечения внешних участков.");
        return;
      }

      createManualRepublicRoadLayers();
    });

    selectAllRoadsEl.addEventListener("click", () => {
      setAllRoadsVisibility(true);
    });

    clearAllRoadsEl.addEventListener("click", () => {
      setAllRoadsVisibility(false);
    });

    function createManualRepublicRoadLayers() {
      const routes = window.REPUBLIC_ROADS || [];
      roadListEl.innerHTML = "";

      if (!routes.length) {
        appendStatus("Статический список республиканских трасс пуст.");
        return;
      }

      routes.forEach(route => {
        const featureCollection = {
          type: "FeatureCollection",
          features: route.features.map(coordinates => ({
            type: "Feature",
            properties: {
              ref: route.ref,
              name: route.name || "Республиканская трасса " + route.ref,
              intRefs: route.intRefs || [],
              lengthKm: route.lengthKm || "",
              isSchematic: Boolean(route.isSchematic),
              source: "Статический слой"
            },
            geometry: {
              type: "LineString",
              coordinates
            }
          }))
        };

        const routeLayer = L.geoJSON(featureCollection, {
          style: {
            color: "#dc2626",
            weight: 3,
            opacity: 0.85
          },
          onEachFeature: bindRoadPopup
        });

        republicRoadLayers.set(route.ref, routeLayer);

        const label = document.createElement("label");
        const checkbox = document.createElement("input");
        const text = document.createElement("span");

        checkbox.type = "checkbox";
        checkbox.value = route.ref;
        text.textContent = route.ref + " — " + (route.name || "республиканская трасса");

        checkbox.addEventListener("change", () => {
          setLayerVisibility(routeLayer, checkbox.checked);
          resetSelectedRoads();
          fitToVisibleLayers();
        });

        label.appendChild(checkbox);
        label.appendChild(text);
        roadListEl.appendChild(label);
      });

      appendStatus("Республиканские трассы готовы: " + routes.length + ". Выберите трассу галочкой.");
    }

    function setAllRoadsVisibility(shouldShow) {
      roadListEl.querySelectorAll("input[type='checkbox']").forEach(checkbox => {
        checkbox.checked = shouldShow;
      });

      republicRoadLayers.forEach(layer => {
        setLayerVisibility(layer, shouldShow);
      });

      resetSelectedRoads();
      fitToVisibleLayers();
    }

    async function loadKazakhstanBoundary() {
      try {
        appendStatus("Загрузка границы Казахстана...");
        const overpassJson = await fetchJson(kazakhstanBoundaryApi);
        const geojson = overpassBoundaryToGeoJson(overpassJson);

        if (!geojson.features.length) {
          throw new Error("ответ пришел без линии границы");
        }

        kazakhstanBoundaryRings = buildBoundaryRings(geojson);
        if (!kazakhstanBoundaryRings.length) {
          throw new Error("не удалось собрать контур Казахстана");
        }

        kazakhstanFillLayer = L.geoJSON(boundaryRingsToPolygonGeoJson(kazakhstanBoundaryRings), {
          style: {
            color: "#2563eb",
            weight: 0,
            opacity: 0,
            fillColor: "#dbeafe",
            fillOpacity: 0.45
          },
          interactive: false
        }).addTo(map);

        kazakhstanBoundaryLayer = L.geoJSON(geojson, {
          style: {
            color: "#2563eb",
            weight: 4,
            opacity: 1,
            fillOpacity: 0
          },
          interactive: false
        }).addTo(map);

        kazakhstanFillLayer.bringToBack();
        kazakhstanBoundaryLayer.bringToFront();
        layersControl.addOverlay(kazakhstanBoundaryLayer, "Граница Казахстана");
        fitToVisibleLayers();
        appendStatus("Граница Казахстана загружена.");
        return true;
      } catch (err) {
        console.warn(err);
        appendStatus("Граница Казахстана не загружена: " + err.message + ".");
        return false;
      }
    }

    async function fetchJson(url) {
      const res = await fetch(url, {
        method: "GET",
        cache: "no-store"
      });

      if (!res.ok) {
        const details = await res.text().catch(() => "");
        throw new Error("статус " + res.status + " " + details.slice(0, 120));
      }

      return res.json();
    }

    function overpassBoundaryToGeoJson(overpassJson) {
      const elements = overpassJson.elements || [];
      const relation = elements.find(element => element.type === "relation");
      const features = [];

      if (!relation || !Array.isArray(relation.members)) {
        return {
          type: "FeatureCollection",
          features
        };
      }

      relation.members.forEach(member => {
        if (member.type !== "way" || !Array.isArray(member.geometry) || member.geometry.length < 2) {
          return;
        }

        features.push({
          type: "Feature",
          properties: {
            name: "Республика Казахстан",
            role: member.role || "outer"
          },
          geometry: {
            type: "LineString",
            coordinates: member.geometry.map(point => [point.lon, point.lat])
          }
        });
      });

      return {
        type: "FeatureCollection",
        features
      };
    }

    function clipFeatureCollectionToKazakhstan(featureCollection) {
      if (!kazakhstanBoundaryRings.length) {
        return {
          type: "FeatureCollection",
          features: []
        };
      }

      return featureCollection;
    }

    function clipRoadFeatureToKazakhstan(feature) {
      if (!feature.geometry || feature.geometry.type !== "LineString") {
        return [];
      }

      const clippedParts = splitLineInsideKazakhstan(feature.geometry.coordinates);

      return clippedParts.map(coordinates => ({
        type: "Feature",
        properties: feature.properties || {},
        geometry: {
          type: "LineString",
          coordinates
        }
      }));
    }

    function splitLineInsideKazakhstan(coordinates) {
      const parts = [];
      let currentPart = [];

      coordinates.forEach(coordinate => {
        if (isPointInsideKazakhstan(coordinate)) {
          currentPart.push(coordinate);
          return;
        }

        if (currentPart.length > 1) {
          parts.push(currentPart);
        }
        currentPart = [];
      });

      if (currentPart.length > 1) {
        parts.push(currentPart);
      }

      return parts;
    }

    function isPointInsideKazakhstan(coordinate) {
      return kazakhstanBoundaryRings.some(ring => pointInRing(coordinate, ring));
    }

    function pointInRing(point, ring) {
      const x = point[0];
      const y = point[1];
      let inside = false;

      for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
        const xi = ring[i][0];
        const yi = ring[i][1];
        const xj = ring[j][0];
        const yj = ring[j][1];
        const intersects = ((yi > y) !== (yj > y)) &&
          (x < ((xj - xi) * (y - yi)) / (yj - yi) + xi);

        if (intersects) {
          inside = !inside;
        }
      }

      return inside;
    }

    function buildBoundaryRings(boundaryGeoJson) {
      const segments = (boundaryGeoJson.features || [])
        .map(feature => feature.geometry && feature.geometry.coordinates)
        .filter(coordinates => Array.isArray(coordinates) && coordinates.length > 1)
        .map(coordinates => coordinates.slice());

      const rings = [];

      while (segments.length) {
        let ring = segments.shift();
        let changed = true;

        while (changed) {
          changed = false;

          for (let index = 0; index < segments.length; index++) {
            const segment = segments[index];
            const ringStart = pointKey(ring[0]);
            const ringEnd = pointKey(ring[ring.length - 1]);
            const segmentStart = pointKey(segment[0]);
            const segmentEnd = pointKey(segment[segment.length - 1]);

            if (ringEnd === segmentStart) {
              ring = ring.concat(segment.slice(1));
            } else if (ringEnd === segmentEnd) {
              ring = ring.concat(segment.slice(0, -1).reverse());
            } else if (ringStart === segmentEnd) {
              ring = segment.slice(0, -1).concat(ring);
            } else if (ringStart === segmentStart) {
              ring = segment.slice(1).reverse().concat(ring);
            } else {
              continue;
            }

            segments.splice(index, 1);
            changed = true;
            break;
          }
        }

        if (ring.length > 3) {
          rings.push(ring);
        }
      }

      return rings.sort((first, second) => second.length - first.length).slice(0, 3);
    }

    function boundaryRingsToPolygonGeoJson(rings) {
      return {
        type: "FeatureCollection",
        features: rings.map(ring => ({
          type: "Feature",
          properties: {
            name: "Республика Казахстан"
          },
          geometry: {
            type: "Polygon",
            coordinates: [closeRing(ring)]
          }
        }))
      };
    }

    function closeRing(ring) {
      const closedRing = ring.slice();
      const first = closedRing[0];
      const last = closedRing[closedRing.length - 1];

      if (pointKey(first) !== pointKey(last)) {
        closedRing.push(first);
      }

      return closedRing;
    }

    function pointKey(point) {
      return point[0].toFixed(5) + "," + point[1].toFixed(5);
    }

    function bindRoadPopup(feature, layer) {
      const props = feature.properties || {};
      const ref = props.ref || props.REF || "Без индекса";
      const name = props.name || props.NAME || "Без названия";
      const network = props.network ? "<br>Сеть: " + escapeHtml(props.network) : "";
      const intRefs = Array.isArray(props.intRefs) && props.intRefs.length
        ? "<br>Международные индексы: " + escapeHtml(props.intRefs.join(", "))
        : "";
      const length = props.lengthKm
        ? "<br>Длина: " + escapeHtml(props.lengthKm) + " км"
        : "";
      const schematic = props.isSchematic
        ? "<br>Геометрия: схематичная"
        : "";
      const source = props.source ? "<br>Источник: " + escapeHtml(props.source) : "";

      layer.bindPopup(
        "<b>" + escapeHtml(ref) + "</b><br>" + escapeHtml(name) + intRefs + length + network + schematic + source
      );

      layer.on("click", () => {
        selectRoad(feature, layer);
      });
    }

    function selectRoad(feature, layer) {
      resetSelectedRoads();

      const props = feature.properties || {};
      selectedRoadRef = normalizeRoadRef(props.ref || props.REF);
      selectedRoadLayers = findRoadLayersByRef(selectedRoadRef, layer);

      selectedRoadLayers.forEach(roadLayer => {
        roadLayer.setStyle({
          color: "#f59e0b",
          weight: 6,
          opacity: 1
        });

        if (roadLayer.bringToFront) {
          roadLayer.bringToFront();
        }
      });
    }

    function findRoadLayersByRef(ref, fallbackLayer) {
      const matchingLayers = [];

      Array.from(republicRoadLayers.values()).forEach(groupLayer => {
        if (!groupLayer) {
          return;
        }

        groupLayer.eachLayer(roadLayer => {
          const roadProps = roadLayer.feature && roadLayer.feature.properties || {};
          const roadRef = normalizeRoadRef(roadProps.ref || roadProps.REF);

          if (ref && roadRef === ref) {
            matchingLayers.push(roadLayer);
          }
        });
      });

      return matchingLayers.length ? matchingLayers : [fallbackLayer];
    }

    function resetSelectedRoads() {
      selectedRoadLayers.forEach(resetRoadStyle);
      selectedRoadLayers = [];
      selectedRoadRef = "";
    }

    function resetRoadStyle(layer) {
      for (const groupLayer of republicRoadLayers.values()) {
        if (groupLayer.hasLayer(layer)) {
          groupLayer.resetStyle(layer);
          return;
        }
      }
    }

    function normalizeRoadRef(ref) {
      const normalized = String(ref || "")
        .toUpperCase()
        .replaceAll("А", "A")
        .replace(/\s+/g, "")
        .replace(/;/g, ",")
        .split(",")[0]
        .trim();

      if (["KAZ01", "M-36", "M36", "E125", "AH7"].includes(normalized)) {
        return "KAZ01";
      }

      return normalized;
    }

    function inferRoadName(routeTags, wayTags) {
      const ref = String(routeTags.ref || wayTags.ref || wayTags.int_ref || routeTags.int_ref || "").toUpperCase().replaceAll("А", "A");

      if (ref.includes("KAZ01") || ref.includes("M-36") || ref.includes("M36") || ref.includes("E125") || ref.includes("AH7")) {
        return routeTags.name || wayTags.name || "Астана - Караганда - Балхаш - Алматы";
      }

      return routeTags.name || wayTags.name || "Без названия";
    }

    function setLayerVisibility(layer, shouldShow) {
      if (!layer) {
        return;
      }

      if (shouldShow) {
        layer.addTo(map);
      } else {
        map.removeLayer(layer);
      }
    }

    function fitToVisibleLayers() {
      const bounds = L.latLngBounds();

      const roadLayers = Array.from(republicRoadLayers.values());

      [kazakhstanFillLayer, kazakhstanBoundaryLayer, ...roadLayers].forEach(layer => {
        if (layer && map.hasLayer(layer)) {
          bounds.extend(layer.getBounds());
        }
      });

      if (bounds.isValid()) {
        map.fitBounds(bounds, { padding: [20, 20] });
      }
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function appendStatus(text) {
      statusEl.textContent = statusEl.textContent + "\n" + text;
    }

    function escapeHtml(str) {
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
